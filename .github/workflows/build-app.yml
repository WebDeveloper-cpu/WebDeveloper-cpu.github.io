name: Build Native App Executables

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target Platform (android)'
        required: true
        default: 'android'

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Android APK
        run: |
          npm install -g @capacitor/cli @capacitor/core
          mkdir -p www
          cp app-builder.html www/index.html 2>/dev/null || true
          npx cap init "My App" "com.example.myapp" --web-dir www
          npx cap add android
          cd android && ./gradlew assembleDebug

      - name: Upload APK Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
