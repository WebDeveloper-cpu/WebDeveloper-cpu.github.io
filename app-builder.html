<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web2App Studio & IDE</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --panel-bg: #1e293b;
      --border-color: #334155;
      --accent: #38bdf8;
      --accent-hover: #0284c7;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --code-bg: #020617;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    /* Fixed body prevents entire web page from scrolling */
    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    /* Header stays permanently locked at the top */
    header {
      flex-shrink: 0;
      background-color: var(--panel-bg);
      border-bottom: 1px solid var(--border-color);
      padding: 0.75rem 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    .brand { font-weight: bold; font-size: 1.1rem; color: var(--accent); }

    button {
      background-color: var(--accent);
      color: #000;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 4px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Workspace fills remaining height */
    .workspace { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      flex: 1;
      height: calc(100vh - 60px); 
      overflow: hidden; 
    }

    .editor-container { 
      display: flex; 
      flex-direction: column; 
      border-right: 1px solid var(--border-color);
      height: 100%;
      overflow: hidden;
    }

    .tab-bar { 
      flex-shrink: 0;
      display: flex; 
      background-color: var(--panel-bg); 
    }

    .tab { padding: 0.5rem 1rem; cursor: pointer; color: var(--text-muted); }
    .tab.active { background-color: var(--bg-dark); color: var(--accent); font-weight: bold; }

    /* Key Fix: Internal scrolling only for the code editor */
    textarea.code-editor {
      flex: 1;
      width: 100%;
      height: 100%;
      background-color: var(--code-bg);
      color: #f1f5f9;
      border: none;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      line-height: 1.5;
      resize: none;
      outline: none;
      display: none;
      overflow-y: auto; 
    }

    textarea.code-editor.active { display: block; }

    .preview-container { 
      display: flex; 
      flex-direction: column; 
      background: #fff;
      height: 100%;
      overflow: hidden;
    }

    iframe#preview-frame { 
      flex: 1; 
      border: none; 
      width: 100%; 
      height: 100%; 
    }

    /* Mobile Responsive Layout Switch */
    @media (max-width: 768px) {
      .workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">⚙️ Web2App Studio</div>
    <button onclick="downloadStandaloneApp()">📲 Download Standalone App (.html)</button>
  </header>

  <div class="workspace">
    <div class="editor-container">
      <div class="tab-bar">
        <div class="tab active" onclick="switchTab('html', event)">HTML</div>
        <div class="tab" onclick="switchTab('css', event)">CSS</div>
        <div class="tab" onclick="switchTab('js', event)">JS</div>
      </div>
      <textarea id="html-editor" class="code-editor active" spellcheck="false"></textarea>
      <textarea id="css-editor" class="code-editor" spellcheck="false"></textarea>
      <textarea id="js-editor" class="code-editor" spellcheck="false"></textarea>
    </div>

    <div class="preview-container">
      <iframe id="preview-frame"></iframe>
    </div>
  </div>

  <script>
    const htmlEditor = document.getElementById('html-editor');
    const cssEditor = document.getElementById('css-editor');
    const jsEditor = document.getElementById('js-editor');
    const previewFrame = document.getElementById('preview-frame');

    htmlEditor.value = `<h1>My Mobile App</h1>\n<button onclick="alert('App Running!')">Click Me</button>`;
    cssEditor.value = `body { font-family: sans-serif; text-align: center; padding: 2rem; }`;
    jsEditor.value = `// Extra JavaScript logic here`;

    function updatePreview() {
      const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
      doc.open();
      doc.write(htmlEditor.value + `<style>${cssEditor.value}</style>` + `<script>${jsEditor.value}<\/script>`);
      doc.close();
    }

    function switchTab(tab, evt) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.code-editor').forEach(e => e.classList.remove('active'));
      
      if (tab === 'html') htmlEditor.classList.add('active');
      if (tab === 'css') cssEditor.classList.add('active');
      if (tab === 'js') jsEditor.classList.add('active');
      
      if (evt && evt.target) evt.target.classList.add('active');
    }

    function downloadStandaloneApp() {
      const fullAppCode = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Mobile App</title>
  <style>${cssEditor.value}</style>
</head>
<body>
  ${htmlEditor.value}
  <script>${jsEditor.value}<\/script>
</body>
</html>`;

      const blob = new Blob([fullAppCode], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'my-standalone-app.html';
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    htmlEditor.addEventListener('input', updatePreview);
    cssEditor.addEventListener('input', updatePreview);
    jsEditor.addEventListener('input', updatePreview);

    updatePreview();
  </script>
</body>
</html>
